<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETABLE Waitlist</title>
    <!-- Tailwind CDN (utilityクラスをそのまま利用するため) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Geist', 'system-ui', 'sans-serif'],
              mono: ['Geist Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
            },
          },
        },
      };
    </script>
    
  </head>
  <body class="bg-background text-foreground">
    <div id="app-shell" class="max-w-md mx-auto bg-background shadow-2xl">
      <div id="app-root"></div>
    </div>

    <div id="business-hours-modal" class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm hidden flex items-end justify-center">
      <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 pb-14 shadow-2xl animate-in slide-in-from-bottom duration-300">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
        
        <h2 class="text-xl font-bold text-[#082752] text-center mb-10">営業時間の設定</h2>
    
        <div class="flex items-center justify-between gap-4 mb-12">
          <div class="min-w-[110px] text-center flex-none">
            <p class="text-xs text-gray-400 mb-2">開始</p>
            <input type="time" id="start-time-input" value="10:00" class="time-input text-4xl leading-none font-bold text-[#082752] bg-transparent outline-none text-center tabular-nums focus:text-[#FD780F]">
          </div>
          <div class="text-2xl text-gray-200">〜</div>
          <div class="min-w-[110px] text-center flex-none">
            <p class="text-xs text-gray-400 mb-2">終了</p>
            <input type="time" id="end-time-input" value="20:00" class="time-input text-4xl leading-none font-bold text-[#082752] bg-transparent outline-none text-center tabular-nums focus:text-[#FD780F]">
          </div>
        </div>
    
        <div class="mb-10">
          <p class="text-xs text-gray-400 mb-4">対象の曜日</p>
          <div class="grid grid-cols-4 gap-3" id="day-selection-grid">
            <button class="day-select-btn h-12 rounded-2xl border border-gray-200 text-sm font-medium text-[#082752] transition-all">月</button>
            <button class="day-select-btn h-12 rounded-2xl border border-gray-200 text-sm font-medium text-[#082752] transition-all">火</button>
            <button class="day-select-btn h-12 rounded-2xl border border-gray-200 text-sm font-medium text-[#082752] transition-all">水</button>
            <button class="day-select-btn h-12 rounded-2xl border border-gray-200 text-sm font-medium text-[#082752] transition-all">木</button>
            <button class="day-select-btn h-12 rounded-2xl border border-gray-200 text-sm font-medium text-[#082752] transition-all">金</button>
            <button class="day-select-btn h-12 rounded-2xl border border-gray-200 text-sm font-medium text-[#082752] transition-all">土</button>
            <button class="day-select-btn h-12 rounded-2xl border border-gray-200 text-sm font-medium text-[#082752] transition-all">日</button>
          </div>
        </div>
    
        <button id="save-business-hours" class="w-full py-5 bg-[#082752] text-white rounded-3xl font-bold text-lg active:scale-95 transition-transform">
          保存する
        </button>
      </div>
    </div>

    <!-- 定休日追加モーダル -->
    <div
      id="closed-days-modal"
      class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm hidden flex items-end justify-center"
    >
      <div class="bg-white w-full max-w-md rounded-t-[40px] p-8 pb-10 shadow-2xl animate-in slide-in-from-bottom duration-300">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>

        <h2 class="text-xl font-bold text-[#082752] text-center mb-10">定休日の追加</h2>

        <div class="bg-gray-100 p-1 rounded-2xl flex gap-2 mb-8">
          <button
            id="closed-days-tab-weekly"
            class="flex-1 py-3 rounded-xl text-sm font-medium bg-[#082752] text-white"
            type="button"
          >
            毎週
          </button>
          <button
            id="closed-days-tab-specific"
            class="flex-1 py-3 rounded-xl text-sm font-medium text-gray-500"
            type="button"
          >
            特定週
          </button>
        </div>

        <!-- 毎週タブ -->
        <div id="closed-days-panel-weekly" class="space-y-4">
          <div>
            <p class="text-xs text-gray-400 mb-4">曜日</p>
            <div class="grid grid-cols-4 gap-3" id="closed-weekly-day-grid">
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">月</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">火</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">水</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">木</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">金</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">土</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">日</button>
            </div>
          </div>
        </div>

        <!-- 特定週タブ -->
        <div id="closed-days-panel-specific" class="space-y-4 hidden">
          <div>
            <p class="text-xs text-gray-400 mb-4">第</p>
            <div class="grid grid-cols-4 gap-3" id="closed-specific-week-grid">
              <button class="closed-week-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" data-week="1" type="button">第1</button>
              <button class="closed-week-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" data-week="2" type="button">第2</button>
              <button class="closed-week-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" data-week="3" type="button">第3</button>
              <button class="closed-week-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" data-week="4" type="button">第4</button>
            </div>
          </div>

          <div>
            <p class="text-xs text-gray-400 mb-4">曜日</p>
            <div class="grid grid-cols-4 gap-3" id="closed-specific-day-grid">
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">月</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">火</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">水</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">木</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">金</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">土</button>
              <button class="closed-day-btn h-12 rounded-2xl border border-gray-200 bg-white text-sm font-medium text-[#082752] transition-all" type="button">日</button>
            </div>
          </div>
        </div>

        <button
          id="add-closed-rule"
          disabled
          class="mt-6 w-full py-5 bg-gray-100 text-gray-400 rounded-3xl font-bold text-lg cursor-not-allowed transition-transform"
          type="button"
        >
          ルールを追加する
        </button>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
